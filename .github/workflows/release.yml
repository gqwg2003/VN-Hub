name: CI/CD

on:
  push:
    branches: [ main ]
    tags:      [ 'v*' ]

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.x'

      - name: Publish
        run: >
          dotnet publish VnHub.csproj
          -c Release
          -r win-x64
          --self-contained true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -o publish/win-x64

      - name: Upload artifact
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v7
        with:
          name: publish
          path: publish/win-x64

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download artifact
        uses: actions/download-artifact@v8
        with:
          name: publish
          path: publish/win-x64

      - name: Extract version
        id: ver
        shell: pwsh
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          $v = $env:REF_NAME -replace '^v', ''
          "value=$v" | Out-File -Append -FilePath $env:GITHUB_OUTPUT

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Build installer
        shell: pwsh
        env:
          APP_VERSION: ${{ steps.ver.outputs.value }}
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" `
            /DMyAppVersion="$env:APP_VERSION" `
            installer.iss

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          name: VnHub v${{ steps.ver.outputs.value }}
          generate_release_notes: true
          files: installer/VnHub-${{ steps.ver.outputs.value }}-Setup.exe
