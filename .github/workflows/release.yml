name: CI/CD

on:
  push:
    branches: [ main ]
    tags:      [ 'v*' ]

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.x'

      - name: Publish
        run: >
          dotnet publish VnHub.csproj
          -c Release
          -r win-x64
          --self-contained true
          -p:PublishSingleFile=true
          -o publish/win-x64

      - name: Extract version
        if: startsWith(github.ref, 'refs/tags/v')
        id: ver
        shell: pwsh
        run: |
          $v = "${{ github.ref_name }}" -replace '^v', ''
          "value=$v" | Out-File -Append -FilePath $env:GITHUB_OUTPUT

      - name: Install Inno Setup
        if: startsWith(github.ref, 'refs/tags/v')
        run: choco install innosetup --no-progress -y

      - name: Build installer
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" `
            /DMyAppVersion="${{ steps.ver.outputs.value }}" `
            installer.iss

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: VnHub v${{ steps.ver.outputs.value }}
          generate_release_notes: true
          files: installer/VnHub-${{ steps.ver.outputs.value }}-Setup.exe
