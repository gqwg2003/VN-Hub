<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VN-Hub</title>
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/shared/animations.css">
    <link rel="stylesheet" href="css/shared/buttons.css">
    <link rel="stylesheet" href="css/shared/tabs.css">
    <link rel="stylesheet" href="css/sidebar.css">
    <link rel="stylesheet" href="css/topbar.css">
    <link rel="stylesheet" href="css/cards.css">
    <link rel="stylesheet" href="css/detail.css">
    <link rel="stylesheet" href="css/modal.css">
    <link rel="stylesheet" href="css/settings.css">
    <link rel="stylesheet" href="css/stats.css">
    <link rel="stylesheet" href="css/toast.css">
    <link rel="stylesheet" href="css/contextmenu.css">
    <link rel="stylesheet" href="css/multiselect.css">
    <link rel="stylesheet" href="css/groups.css">
</head>
<body>
    <div id="splash">
        <div id="splash-title">VN-HUB</div>
        <div id="splash-sub">Visual Novel Library</div>
    </div>
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-logo">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1 0-5H20"/>
            </svg>
            <span>VN-HUB</span>
        </div>
        <nav class="sidebar-nav">
            <button class="nav-btn active" data-tab="library">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
                <span>Library</span>
            </button>
            <button class="nav-btn" data-tab="marked">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m19 21-7-4-7 4V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2v16z"/></svg>
                <span>Marked</span>
            </button>
            <button class="nav-btn" data-tab="reading">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
                <span>Reading</span>
            </button>
            <button class="nav-btn" data-tab="statistics">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 20V10"/><path d="M12 20V4"/><path d="M6 20v-6"/></svg>
                <span>Statistics</span>
            </button>
            <button class="nav-btn" data-tab="settings">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>
                <span>Settings</span>
            </button>
        </nav>
        <div class="group-section-label" data-i18n="groups">Groups</div>
        <div id="groupList"></div>
    </aside>

    <main class="main">
    
        <header class="topbar">
            <div class="topbar-search">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
                <input type="text" id="searchInput" placeholder="Search library..." autocomplete="off" data-i18n-placeholder="searchPlaceholder">
            </div>
            <div class="tag-dropdown-wrap">
                <button class="btn-tags" id="btnTagDropdown" title="Tags">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2 2 7l10 5 10-5-10-5Z"/><path d="m2 17 10 5 10-5"/><path d="m2 12 10 5 10-5"/></svg>
                    <span data-i18n="tags">Tags</span>
                </button>
                <div class="tag-dropdown" id="tagDropdown"></div>
            </div>
            <select class="topbar-select topbar-status-filter" id="statusFilter">
                <option value="-1" data-i18n="allStatuses">All Statuses</option>
                <option value="0" data-i18n="statusReading">Reading</option>
                <option value="1" data-i18n="statusCompleted">Completed</option>
                <option value="2" data-i18n="statusOnHold">On Hold</option>
                <option value="3" data-i18n="statusDropped">Dropped</option>
                <option value="4" data-i18n="statusPlanToRead">Plan to Read</option>
            </select>
            <div class="topbar-controls">
                <select class="topbar-select" id="sortSelect">
                    <option value="title" data-i18n="sortByName">Name</option>
                    <option value="dateAdded" data-i18n="sortByDate">Date Added</option>
                    <option value="status" data-i18n="sortByStatus">Status</option>
                    <option value="playTime" data-i18n="sortByPlayTime">Play Time</option>
                    <option value="lastLaunched" data-i18n="sortByLastLaunched">Last Launched</option>
                    <option value="rating" data-i18n="sortByRating">Rating</option>
                    <option value="userRating" data-i18n="sortByUserRating">Your Rating</option>
                </select>
                <button class="btn-sort-dir" id="btnSortDir" title="Toggle sort direction">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 8 4-4 4 4"/><path d="M7 4v16"/><path d="m21 16-4 4-4-4"/><path d="M17 20V4"/></svg>
                </button>
                <div class="grid-toggle" id="gridToggle">
                    <button class="grid-toggle-btn active" data-size="medium" title="Medium grid">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
                    </button>
                    <button class="grid-toggle-btn" data-size="small" title="Small grid">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="2" width="5" height="5"/><rect x="9.5" y="2" width="5" height="5"/><rect x="17" y="2" width="5" height="5"/><rect x="2" y="9.5" width="5" height="5"/><rect x="9.5" y="9.5" width="5" height="5"/><rect x="17" y="9.5" width="5" height="5"/><rect x="2" y="17" width="5" height="5"/><rect x="9.5" y="17" width="5" height="5"/><rect x="17" y="17" width="5" height="5"/></svg>
                    </button>
                    <button class="grid-toggle-btn" data-size="list" title="List view">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
                    </button>
                </div>
            </div>
            <button class="btn-add" id="btnScanFolder" title="Scan Folder">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/><line x1="9" y1="14" x2="15" y2="14"/></svg>
                <span data-i18n="scanFolder">Scan</span>
            </button>
            <button class="btn-add" id="btnAdd" title="Add VN">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="M12 5v14"/></svg>
                <span data-i18n="addVn">Add VN</span>
            </button>
        </header>

        <div class="marked-tabs" id="markedTabs" style="display:none;">
            <button class="marked-tab active" data-subtab="all">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m19 21-7-4-7 4V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2v16z"/></svg>
                <span data-i18n="markedAll">All</span>
            </button>
            <button class="marked-tab" data-subtab="favorites">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/></svg>
                <span data-i18n="favorites">Favorites</span>
            </button>
            <button class="marked-tab" data-subtab="priority">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
                <span data-i18n="priority">Priority</span>
            </button>
            <button class="marked-tab" data-subtab="completed">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
                <span data-i18n="statusCompleted">Completed</span>
            </button>
        </div>

        <section class="content" id="contentLibrary">
            <div class="reading-strip" id="readingStrip" style="display:none;"></div>
            <div class="card-grid" id="cardGrid"></div>
            <div class="empty-state" id="emptyState" style="display:none;">
                <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1 0-5H20"/></svg>
                <h3>Your library is empty</h3>
                <p>Click "Add VN" to get started</p>
            </div>
        </section>

        <section class="content stats-page" id="contentStatistics" style="display:none;"></section>

        <section class="content settings-page" id="contentSettings" style="display:none;"></section>
    </main>

    <div class="detail-overlay" id="detailOverlay"></div>
    <aside class="detail-panel" id="detailPanel"></aside>

    <div class="modal-overlay" id="addModal" style="display:none;">
        <div class="modal">
            <h3 data-i18n="addTitle">Add Visual Novel</h3>
            <div class="modal-field">
                <label data-i18n="titleLabel">Title (auto-filled from .exe if empty)</label>
                <input type="text" id="addTitle" class="detail-input" placeholder="Leave blank to use exe name" autofocus data-i18n-placeholder="titlePlaceholder">
            </div>
            <div class="modal-field">
                <label data-i18n="exeLabel">Executable (optional)</label>
                <div class="detail-exe-row">
                    <input type="text" id="addExe" class="detail-input" readonly placeholder="Select .exe..." data-i18n-placeholder="exePlaceholder">
                    <button class="btn-secondary btn-small" id="btnAddPickExe" data-i18n="browse">Browse</button>
                </div>
            </div>
            <div class="modal-field" id="addSkipVndbWrap">
                <label class="toggle-label">
                    <input type="checkbox" id="addSkipVndb">
                    <span data-i18n="skipVndbLabel">Don't fetch data from VNDB</span>
                </label>
            </div>
            <div class="modal-buttons">
                <button class="btn-secondary" id="btnAddCancel" data-i18n="cancel">Cancel</button>
                <button class="btn-accent" id="btnAddConfirm" data-i18n="add">Add</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="deleteModal" style="display:none;">
        <div class="modal modal-small">
            <h3 data-i18n="deleteTitle">Delete Entry?</h3>
            <p data-i18n="deleteMessage">This will permanently remove this VN from your library.</p>
            <div class="modal-buttons">
                <button class="btn-secondary" id="btnDeleteCancel" data-i18n="cancel">Cancel</button>
                <button class="btn-danger" id="btnDeleteConfirm" data-i18n="delete">Delete</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="promptModal" style="display:none;">
        <div class="modal modal-small">
            <h3 id="promptModalTitle"></h3>
            <div class="modal-field">
                <input type="text" id="promptModalInput" class="detail-input" autocomplete="off">
            </div>
            <div class="modal-buttons">
                <button class="btn-secondary" id="promptModalCancel" data-i18n="cancel">Cancel</button>
                <button class="btn-accent" id="promptModalOk" data-i18n="ok">OK</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="confirmModal" style="display:none;">
        <div class="modal modal-small">
            <h3 id="confirmModalTitle"></h3>
            <p id="confirmModalText"></p>
            <div class="modal-buttons">
                <button class="btn-secondary" id="confirmModalCancel" data-i18n="cancel">Cancel</button>
                <button class="btn-danger" id="confirmModalOk">OK</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="scanModal" style="display:none;">
        <div class="modal modal-wide">
            <h3 data-i18n="scanTitle">Scan Folder</h3>
            <div class="scan-status" id="scanStatus" style="display:none;">
                <svg class="scan-spinner" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>
                <span data-i18n="scanning">Scanning...</span>
            </div>
            <div class="scan-results" id="scanResults"></div>
            <div class="modal-buttons">
                <button class="btn-secondary" id="btnScanCancel" data-i18n="cancel">Cancel</button>
                <button class="btn-accent" id="btnScanAdd" data-i18n="addSelected" style="display:none;">Add Selected</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="bulkDeleteModal" style="display:none;">
        <div class="modal modal-small">
            <h3 data-i18n="bulkDeleteTitle">Delete Selected?</h3>
            <p id="bulkDeleteText"></p>
            <div class="modal-buttons">
                <button class="btn-secondary" id="btnBulkDeleteCancel" data-i18n="cancel">Cancel</button>
                <button class="btn-danger" id="btnBulkDeleteConfirm" data-i18n="delete">Delete</button>
            </div>
        </div>
    </div>

    <script src="js/utils/parse.js"></script>
    <script src="js/utils/sanitize.js"></script>
    <script src="js/utils/format.js"></script>
    <script src="js/utils/icons.js"></script>
    <script src="js/toast.js"></script>
    <script src="js/contextmenu.js"></script>
    <script src="js/multiselect.js"></script>
    <script src="js/groups.js"></script>
    <script src="js/state.js"></script>
    <script src="js/lang/en.js"></script>
    <script src="js/lang/ru.js"></script>
    <script src="js/lang/ja.js"></script>
    <script src="js/i18n.js"></script>
    <script src="js/grid.js"></script>
    <script src="js/detail.js"></script>
    <script src="js/modal.js"></script>
    <script src="js/nav.js"></script>
    <script src="js/settings.js"></script>
    <script src="js/customization.js"></script>
    <script src="js/stats.js"></script>
    <script src="js/bridge.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
