<h2 data-i18n="statistics">Statistics</h2>
<div class="stats-tabs">
    <button class="stats-tab active" data-tab="overview" data-i18n="statsTabOverview">Overview</button>
    <button class="stats-tab" data-tab="achievements" data-i18n="achievements">Achievements</button>
</div>

<div class="stats-tab-content active" data-tab-content="overview">
    <div class="stats-cards" id="statsCards"></div>

    <div class="stats-grid-2col">
        <div class="stats-section stats-panel">
            <h3 data-i18n="statsTopPlayed">Top Played</h3>
            <div class="stats-ranking" id="statsTopPlayed"></div>
        </div>
        <div class="stats-section stats-panel">
            <h3 data-i18n="statsTopRated">Top Rated</h3>
            <div class="stats-ranking" id="statsTopRated"></div>
        </div>
    </div>

    <div class="stats-section stats-panel">
        <h3 data-i18n="statsByStatus">By Status</h3>
        <div class="stats-bars" id="statsStatusBars"></div>
    </div>
    <div class="stats-section stats-panel">
        <h3 data-i18n="statsMonthly">Monthly Additions</h3>
        <div class="stats-chart" id="statsChart"></div>
    </div>
    <div class="stats-grid-2col">
        <div class="stats-section stats-panel">
            <h3 data-i18n="statsRatingDist">Rating Distribution</h3>
            <div class="stats-bars" id="statsRatingDist"></div>
        </div>
        <div class="stats-section stats-panel">
            <h3 data-i18n="categoryRatings">Category Ratings</h3>
            <div class="stats-bars" id="statsCategoryRatings"></div>
        </div>
    </div>
    <div class="stats-section stats-panel">
        <h3 data-i18n="statsTopTags">Top Tags</h3>
        <div class="stats-bars" id="statsTopTags"></div>
    </div>
    <div class="stats-section stats-panel">
        <div class="stats-panel-header">
            <h3 data-i18n="statsPlayTime">Play Time</h3>
            <div class="stats-period-selector" id="playStatsPeriod">
                <button class="stats-period-btn" data-days="7" data-i18n="period7d">7d</button>
                <button class="stats-period-btn active" data-days="30" data-i18n="period30d">30d</button>
                <button class="stats-period-btn" data-days="90" data-i18n="period90d">90d</button>
                <button class="stats-period-btn" data-days="365" data-i18n="period1y">1y</button>
                <button class="stats-period-btn" data-days="0" data-i18n="periodAll">All</button>
            </div>
        </div>
        <div class="stats-chart" id="statsPlayChart"></div>
    </div>
</div>

<div class="stats-tab-content" data-tab-content="achievements">
    <div class="stats-section stats-panel">
        <div class="stats-achievements" id="statsAchievements"></div>
    </div>
</div>
